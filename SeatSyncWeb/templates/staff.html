<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>SeatSync - Staff Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">🛸 Command Center: Staff</h2>
    
    <input type="text" class="form-control glass-panel mb-4 text-light w-50" placeholder="🔍 Search event ID or name...">

    <!-- Bố cục 2/3 và 1/3 -->
    <div class="staff-container">
        
        <!-- Box Trái (2/3): Danh sách Guest -->
        <div class="glass-panel p-4 overflow-auto">
            <h4 class="mb-3">Passenger List</h4>
            <table class="table table-dark table-hover bg-transparent">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for guest in guests %}
                    <tr style="cursor: pointer;" onclick="showDetails('{{ guest.name }}', '{{ guest.email }}', '{{ guest.status }}')">
                        <td>{{ guest.id }}</td>
                        <td>{{ guest.name }}</td>
                        <td>
                            {% if guest.status == 'Pending' %} <span class="badge bg-warning text-dark">Pending</span>
                            {% else %} <span class="badge bg-success">Attended</span> {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Box Phải (1/3): Chi tiết & Check-in -->
        <div class="glass-panel p-4 d-flex flex-column">
            <h4 class="mb-4">Passenger Details</h4>
            <div id="guest-details" class="flex-grow-1 text-center mt-5">
                <p class="text-muted">Select a passenger from the list to view details.</p>
            </div>
            <button class="btn btn-success w-100 py-3 mt-auto fw-bold" id="checkin-btn" disabled>VERIFY & CHECK-IN</button>
        </div>

    </div>
</div>

<script>
    // JS đơn giản để khi ấn vào list bên trái thì thông tin hiện lên bên phải
    function showDetails(name, email, status) {
        document.getElementById('guest-details').innerHTML = `
            <img src="https://ui-avatars.com/api/?name=${name}&background=random" class="rounded-circle mb-3 shadow" width="100">
            <h3 class="fw-bold">${name}</h3>
            <p>📧 ${email}</p>
            <p class="mt-4">Current Status: <strong class="${status === 'Pending' ? 'text-warning' : 'text-success'}">${status}</strong></p>
        `;
        document.getElementById('checkin-btn').disabled = (status === 'Attended');
    }
</script>
</body>
</html>
