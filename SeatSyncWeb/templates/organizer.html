<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatSync - Organizer Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-5" style="max-width: 800px;">
    <h2 class="mb-4 text-center text-danger fw-bold">👑 Ban Tổ Chức (Organizer)</h2>

    <div class="glass-panel p-4">
        <!-- Đã sửa lỗi ARIA: Thêm role="tab" và các thuộc tính aria -->
        <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-pill px-4" id="add-tab-btn" data-bs-toggle="pill" data-bs-target="#add-event" type="button" role="tab" aria-controls="add-event" aria-selected="true">✨ Tạo Sự Kiện Mới</button>
            </li>
            <li class="nav-item mx-2" role="presentation">
                <button class="nav-link rounded-pill px-4" id="edit-tab-btn" data-bs-toggle="pill" data-bs-target="#edit-event" type="button" role="tab" aria-controls="edit-event" aria-selected="false">✏️ Chỉnh Sửa Sự Kiện</button>
            </li>
        </ul>

        <div class="tab-content text-light">
            
            <!-- FORM TẠO MỚI -->
            <div class="tab-pane fade show active" id="add-event" role="tabpanel" aria-labelledby="add-tab-btn">
                <form>
                    <!-- Đã sửa lỗi Form Label: Thêm for="eventName" khớp với id="eventName" -->
                    <div class="mb-3">
                        <label for="eventName" class="form-label text-info">Tên Sự Kiện</label>
                        <input type="text" id="eventName" class="form-control bg-transparent text-light border-secondary" placeholder="Nhập tên sự kiện...">
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label for="eventDate" class="form-label text-info">Ngày diễn ra</label>
                            <input type="date" id="eventDate" class="form-control bg-transparent text-light border-secondary">
                        </div>
                        <div class="col">
                            <label for="eventVenue" class="form-label text-info">Địa điểm (Venue)</label>
                            <select id="eventVenue" class="form-select bg-transparent text-light border-secondary">
                                <option class="text-dark" value="">-- Chọn địa điểm --</option>
                                {% for v in venues %}
                                <option class="text-dark" value="{{ v.id }}">{{ v.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="eventBanner" class="form-label text-info">Ảnh minh họa (Banner)</label>
                        <input type="file" id="eventBanner" class="form-control bg-transparent text-light border-secondary">
                    </div>
                    <button type="button" class="btn btn-success w-100 fw-bold">🚀 PHÁT HÀNH SỰ KIỆN</button>
                </form>
            </div>

            <!-- FORM CHỈNH SỬA -->
            <div class="tab-pane fade" id="edit-event" role="tabpanel" aria-labelledby="edit-tab-btn">
                <div class="mb-4">
                    <label for="selectEditEvent" class="form-label text-warning">Chọn sự kiện cần sửa</label>
                    <select id="selectEditEvent" class="form-select bg-transparent text-light border-warning">
                        <option class="text-dark" value="">-- Mời chọn sự kiện --</option>
                        {% for e in events %}
                        <option class="text-dark" value="{{ e.id }}">{{ e.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <hr class="border-secondary">
                <form>
                    <div class="mb-3">
                        <label for="editEventName" class="form-label">Tên Sự Kiện Mới</label>
                        <input type="text" id="editEventName" class="form-control bg-transparent text-light border-secondary">
                    </div>
                    <div class="mb-4">
                        <label for="editEventDate" class="form-label">Ngày dời lịch</label>
                        <input type="date" id="editEventDate" class="form-control bg-transparent text-light border-secondary">
                    </div>
                    <button type="button" class="btn btn-warning w-100 fw-bold text-dark">LƯU THAY ĐỔI</button>
                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
